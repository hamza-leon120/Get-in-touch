<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./scss/style.css">
    <title>Document</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            emailjs.init({
                publicKey: "4daW0VVNEGAscklA_",
            });
        })();
    </script>
</head>

<body>
    <section>
        <div class="container">
            <div class="title">
                <p>Get in <span>touch</span></p>
                <p>Reach out, and let's create a universe of possibilities together!</p>
            </div>
            <div class="contact">
                <div class="right">
                    <p>Let’s connect constellations</p>
                    <p>Let's align our constellations! Reach out and let the magic of collaboration illuminate our
                        skies.</p>
                    <div class="info">
                        <div class="name">
                            <input id="last-name" type="text" placeholder="Last Name">
                            <input id="firsr-name" type="text" placeholder="First Name">
                        </div>
                        <input id="number" type="text" placeholder="Phone Number">
                        <input id="email" type="text" placeholder="Email">
                        <input id="message" type="text" placeholder="Message">
                    </div>
                    <div class="button">
                        <p>Send it to the moon</p>
                    </div>
                </div>
                <div class="left"></div>
            </div>
        </div>
    </section>
    <script src="./main.js"></script>
</body>

</html>
